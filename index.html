<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <h1>Prehľad nasadení</h1>

    <div id="loading" class="loading">Načítavam nasadenia...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="tablesContainer" style="display: none;"></div>
  </div>

  <script>
    /**
     * Koľko najnovších nasadení prehľadáme na zistenie názvov prostredí u daného repozitára.
     * (Samotné zobrazenie: vždy len 1 najnovšie nasadenie na pár repozitár + prostredie.)
     */
    const DISCOVER_DEPLOYMENTS_PAGE_SIZE = 10;

    function deploymentEnvironmentKey(d) {
      return d.environment && String(d.environment).trim() !== ""
        ? d.environment
        : "—";
    }

    function getStatusClass(state) {
      const map = {
        success: "status--success",
        failure: "status--failure",
        error: "status--error",
        pending: "status--pending",
        queued: "status--queued",
        in_progress: "status--in_progress",
        inactive: "status--inactive"
      };
      return map[state] || "status--loading";
    }

    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      return date.toLocaleString("sk-SK", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function showError(msg) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("tablesContainer").style.display = "none";
      const err = document.getElementById("error");
      err.textContent = msg;
      err.style.display = "block";
    }

    /** Najnovší stav z /statuses (podľa created_at), nie len prvý prvok poľa. */
    function fetchDeploymentStatus(owner, repo, deploymentId) {
      return fetch(
        `https://api.github.com/repos/${owner}/${repo}/deployments/${deploymentId}/statuses`
      )
        .then((res) => res.json())
        .then((statuses) => {
          if (!Array.isArray(statuses) || statuses.length === 0) return null;
          const sorted = [...statuses].sort(
            (a, b) =>
              new Date(b.created_at || 0) - new Date(a.created_at || 0)
          );
          const latest = sorted[0];
          return latest && latest.state ? latest.state : null;
        })
        .catch(() => null);
    }

    /**
     * Pre daný repozitár: pre každé prostredie najviac jedno nasadenie – najnovšie
     * (GitHub vracia zoradené od najnovšieho; berieme per_page=1 pri filtri environment).
     */
    function fetchRepoDeployments(owner, repo) {
      return fetch(
        `https://api.github.com/repos/${owner}/${repo}/deployments?per_page=${DISCOVER_DEPLOYMENTS_PAGE_SIZE}`
      )
        .then((res) => {
          if (!res.ok) throw new Error(`${owner}/${repo}: HTTP ${res.status}`);
          return res.json();
        })
        .then((deployments) => {
          const discoverList = Array.isArray(deployments) ? deployments : [];
          const envNames = new Set(discoverList.map(deploymentEnvironmentKey));

          const perEnvLists = Array.from(envNames).map((envName) => {
            if (envName === "—") {
              const best = discoverList
                .filter((d) => deploymentEnvironmentKey(d) === "—")
                .sort(
                  (a, b) =>
                    new Date(b.created_at) - new Date(a.created_at)
                )[0];
              return Promise.resolve(best ? [best] : []);
            }
            return fetch(
              `https://api.github.com/repos/${owner}/${repo}/deployments?` +
                new URLSearchParams({
                  environment: envName,
                  per_page: "1"
                })
            )
              .then((r) => (r.ok ? r.json() : []))
              .then((list) => {
                const arr = Array.isArray(list) ? list : [];
                return arr.length ? [arr[0]] : [];
              });
          });

          return Promise.all(perEnvLists).then((lists) => {
            const merged = lists.flat();
            const seen = new Set();
            const unique = merged.filter((d) => {
              if (seen.has(d.id)) return false;
              seen.add(d.id);
              return true;
            });
            return Promise.all(
              unique.map((d) =>
                fetchDeploymentStatus(owner, repo, d.id).then((state) => ({
                  ...d,
                  owner,
                  repo,
                  state: state || "—"
                }))
              )
            );
          });
        })
        .catch((err) => {
          console.warn("Chyba pre " + owner + "/" + repo + ":", err);
          return [];
        });
    }

    /** Ak je ten istý repozitár v config 2× alebo z API duplicita – nech ostane novší záznam. */
    function dedupeByRepoAndEnvironment(rows) {
      const map = new Map();
      rows.forEach((row) => {
        const env = row.environment || "—";
        const key = `${row.owner}/${row.repo}\0${env}`;
        const prev = map.get(key);
        if (
          !prev ||
          new Date(row.created_at) > new Date(prev.created_at)
        ) {
          map.set(key, row);
        }
      });
      return Array.from(map.values());
    }

    fetch("config.json")
      .then((res) => {
        if (!res.ok) throw new Error("Nepodarilo sa načítať config.json");
        return res.json();
      })
      .then((config) => {
        const { organization, repositories } = config;
        if (!organization || !repositories || !Array.isArray(repositories)) {
          throw new Error("Neplatná konfigurácia: očakáva sa organization a repositories");
        }
        if (repositories.length === 0) {
          document.getElementById("loading").textContent = "Žiadne repozitáre v konfigurácii.";
          return null;
        }
        return Promise.all(
          repositories.map((repo) => fetchRepoDeployments(organization, repo))
        ).then((allRows) => ({ organization, allRows }));
      })
      .then((result) => {
        if (!result) return;
        const { organization, allRows } = result;
        const rows = dedupeByRepoAndEnvironment(allRows.flat());

        if (rows.length === 0) {
          document.getElementById("loading").textContent = "Žiadne nasadenia.";
          document.getElementById("loading").style.display = "block";
          document.getElementById("tablesContainer").style.display = "none";
          return;
        }

        const byEnv = {};
        rows.forEach((row) => {
          const env = row.environment || "—";
          if (!byEnv[env]) byEnv[env] = [];
          byEnv[env].push(row);
        });

        Object.keys(byEnv).forEach((env) => {
          byEnv[env].sort((a, b) =>
            String(a.repo).localeCompare(String(b.repo), "sk")
          );
        });

        document.getElementById("loading").style.display = "none";
        const container = document.getElementById("tablesContainer");
        container.style.display = "block";
        container.innerHTML = "";

        const filterBar = buildFilterBar();
        container.appendChild(filterBar);

        Object.keys(byEnv)
          .sort()
          .forEach((env) => {
            const envRows = byEnv[env];

            const table = document.createElement("table");
            table.className = "dashboard-table dashboard-data-table";
            table.innerHTML = `
              <thead>
                <tr>
                  <th>Prostredie</th>
                  <th>Repozitár</th>
                  <th>Nasadený tag</th>
                  <th>Čas nasadenia</th>
                  <th>Stav</th>
                </tr>
              </thead>
              <tbody></tbody>
            `;

            const tbody = table.querySelector("tbody");
            envRows.forEach((row) => {
              const tr = document.createElement("tr");
              const envLabel = row.environment || "—";
              const state = row.state === "—" ? "—" : row.state;
              const statusClass =
                state === "—" ? "status--loading" : getStatusClass(state);

              const repoUrl = `https://github.com/${row.owner}/${row.repo}`;
              tr.innerHTML = `
                <td>${envLabel}</td>
                <td><a href="${repoUrl}" target="_blank" rel="noopener">${row.repo}</a></td>
                <td>${row.ref || "—"}</td>
                <td>${formatDate(row.created_at)}</td>
                <td><span class="status ${statusClass}">${state}</span></td>
              `;
              tbody.appendChild(tr);
            });

            container.appendChild(table);
          });

        setupClientFilters();
      })
      .catch((err) => showError("Chyba pri načítavaní: " + err.message));

    function buildFilterBar() {
      const wrap = document.createElement("div");
      wrap.className = "filter-bar";
      wrap.innerHTML = `
        <p class="filter-bar__hint">Filtrovanie len v prehliadači (načítané dáta, bez volania API).</p>
        <p class="filter-empty" id="filterEmptyMessage" hidden>Žiadny riadok nevyhovuje zadaným filtrom.</p>
        <table class="dashboard-table dashboard-filter">
          <thead>
            <tr>
              <th>Prostredie</th>
              <th>Repozitár</th>
              <th>Nasadený tag</th>
              <th>Čas nasadenia</th>
              <th>Stav</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="search" class="filter-input" data-filter-col="0" placeholder="Hľadať…" autocomplete="off" spellcheck="false" aria-label="Filter: prostredie" /></td>
              <td><input type="search" class="filter-input" data-filter-col="1" placeholder="Hľadať…" autocomplete="off" spellcheck="false" aria-label="Filter: repozitár" /></td>
              <td><input type="search" class="filter-input" data-filter-col="2" placeholder="Hľadať…" autocomplete="off" spellcheck="false" aria-label="Filter: tag" /></td>
              <td><input type="search" class="filter-input" data-filter-col="3" placeholder="Hľadať…" autocomplete="off" spellcheck="false" aria-label="Filter: čas" /></td>
              <td class="filter-cell--actions">
                <input type="search" class="filter-input" data-filter-col="4" placeholder="Stav…" autocomplete="off" spellcheck="false" aria-label="Filter: stav" />
                <button type="button" class="filter-clear" title="Vymazať všetky filtre">Vyčistiť</button>
              </td>
            </tr>
          </tbody>
        </table>
      `;
      return wrap;
    }

    function applyClientFilters() {
      const inputs = document.querySelectorAll(".filter-input");
      const filters = Array.from(inputs).map((el) =>
        (el.value || "").trim().toLowerCase()
      );

      let totalVisible = 0;
      document.querySelectorAll("table.dashboard-data-table").forEach((table) => {
        let visibleCount = 0;
        table.querySelectorAll("tbody tr").forEach((tr) => {
          const tds = tr.querySelectorAll("td");
          let match = true;
          for (let i = 0; i < 5; i++) {
            if (!filters[i]) continue;
            const cellText = (tds[i] && tds[i].textContent) || "";
            if (!cellText.toLowerCase().includes(filters[i])) {
              match = false;
              break;
            }
          }
          tr.hidden = !match;
          if (match) visibleCount += 1;
        });
        table.hidden = visibleCount === 0;
        totalVisible += visibleCount;
      });

      const emptyMsg = document.getElementById("filterEmptyMessage");
      if (emptyMsg) emptyMsg.hidden = totalVisible > 0;
    }

    function setupClientFilters() {
      const bar = document.querySelector(".filter-bar");
      if (!bar) return;

      bar.querySelectorAll(".filter-input").forEach((input) => {
        input.addEventListener("input", applyClientFilters);
        input.addEventListener("search", applyClientFilters);
      });

      const clearBtn = bar.querySelector(".filter-clear");
      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          bar.querySelectorAll(".filter-input").forEach((el) => {
            el.value = "";
          });
          applyClientFilters();
          bar.querySelector(".filter-input")?.focus();
        });
      }

      applyClientFilters();
    }
  </script>
</body>
</html>
