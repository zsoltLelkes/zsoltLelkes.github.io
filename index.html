<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <h1>Prehľad nasadení</h1>

    <div id="loading" class="loading">Načítavam nasadenia...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="tablesContainer" style="display: none;"></div>
  </div>

  <script>
    /**
     * Max. počet nasadení na repozitár **na každé prostredie** (nie spolu cez celý repozitár).
     * GitHub API: jedno volanie ?per_page=N vracia N najnovších nasadení celkovo – preto načítavame
     * osobitne pre každé prostredie (?environment=…).
     */
    const MAX_DEPLOYMENTS_PER_REPO = 3;

    /** Koľko najnovších nasadení prehľadáme na objavenie názvov prostredí (pred načítaním per-env). */
    const DISCOVER_DEPLOYMENTS_PAGE_SIZE = 100;

    function deploymentEnvironmentKey(d) {
      return d.environment && String(d.environment).trim() !== ""
        ? d.environment
        : "—";
    }

    function getStatusClass(state) {
      const map = {
        success: "status--success",
        failure: "status--failure",
        error: "status--error",
        pending: "status--pending",
        queued: "status--queued",
        in_progress: "status--in_progress",
        inactive: "status--inactive"
      };
      return map[state] || "status--loading";
    }

    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      return date.toLocaleString("sk-SK", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function showError(msg) {
      document.getElementById("loading").style.display = "none";
      document.getElementById("tablesContainer").style.display = "none";
      const err = document.getElementById("error");
      err.textContent = msg;
      err.style.display = "block";
    }

    function fetchDeploymentStatus(owner, repo, deploymentId) {
      return fetch(
        `https://api.github.com/repos/${owner}/${repo}/deployments/${deploymentId}/statuses`
      )
        .then((res) => res.json())
        .then((statuses) => (statuses && statuses[0] ? statuses[0].state : null))
        .catch(() => null);
    }

    function fetchRepoDeployments(owner, repo) {
      return fetch(
        `https://api.github.com/repos/${owner}/${repo}/deployments?per_page=${DISCOVER_DEPLOYMENTS_PAGE_SIZE}`
      )
        .then((res) => {
          if (!res.ok) throw new Error(`${owner}/${repo}: HTTP ${res.status}`);
          return res.json();
        })
        .then((deployments) => {
          const discoverList = Array.isArray(deployments) ? deployments : [];
          const envNames = new Set(discoverList.map(deploymentEnvironmentKey));

          const perEnvLists = Array.from(envNames).map((envName) => {
            if (envName === "—") {
              const filtered = discoverList
                .filter((d) => deploymentEnvironmentKey(d) === "—")
                .sort(
                  (a, b) =>
                    new Date(b.created_at) - new Date(a.created_at)
                )
                .slice(0, MAX_DEPLOYMENTS_PER_REPO);
              return Promise.resolve(filtered);
            }
            return fetch(
              `https://api.github.com/repos/${owner}/${repo}/deployments?` +
                new URLSearchParams({
                  environment: envName,
                  per_page: String(MAX_DEPLOYMENTS_PER_REPO)
                })
            )
              .then((r) => (r.ok ? r.json() : []))
              .then((list) =>
                (Array.isArray(list) ? list : []).slice(
                  0,
                  MAX_DEPLOYMENTS_PER_REPO
                )
              );
          });

          return Promise.all(perEnvLists).then((lists) => {
            const merged = lists.flat();
            const seen = new Set();
            const unique = merged.filter((d) => {
              if (seen.has(d.id)) return false;
              seen.add(d.id);
              return true;
            });
            return Promise.all(
              unique.map((d) =>
                fetchDeploymentStatus(owner, repo, d.id).then((state) => ({
                  ...d,
                  owner,
                  repo,
                  state: state || "—"
                }))
              )
            );
          });
        })
        .catch((err) => {
          console.warn("Chyba pre " + owner + "/" + repo + ":", err);
          return [];
        });
    }

    fetch("config.json")
      .then((res) => {
        if (!res.ok) throw new Error("Nepodarilo sa načítať config.json");
        return res.json();
      })
      .then((config) => {
        const { organization, repositories } = config;
        if (!organization || !repositories || !Array.isArray(repositories)) {
          throw new Error("Neplatná konfigurácia: očakáva sa organization a repositories");
        }
        if (repositories.length === 0) {
          document.getElementById("loading").textContent = "Žiadne repozitáre v konfigurácii.";
          return null;
        }
        return Promise.all(
          repositories.map((repo) => fetchRepoDeployments(organization, repo))
        ).then((allRows) => ({ organization, allRows }));
      })
      .then((result) => {
        if (!result) return;
        const { organization, allRows } = result;
        const rows = allRows.flat();

        if (rows.length === 0) {
          document.getElementById("loading").textContent = "Žiadne nasadenia.";
          document.getElementById("loading").style.display = "block";
          document.getElementById("tablesContainer").style.display = "none";
          return;
        }

        const byEnv = {};
        rows.forEach((row) => {
          const env = row.environment || "—";
          if (!byEnv[env]) byEnv[env] = [];
          byEnv[env].push(row);
        });

        Object.keys(byEnv).forEach((env) => {
          byEnv[env].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        });

        document.getElementById("loading").style.display = "none";
        const container = document.getElementById("tablesContainer");
        container.style.display = "block";
        container.innerHTML = "";

        Object.keys(byEnv)
          .sort()
          .forEach((env) => {
            const envRows = byEnv[env];

            const table = document.createElement("table");
            table.className = "dashboard-table";
            table.innerHTML = `
              <thead>
                <tr>
                  <th>Prostredie</th>
                  <th>Repozitár</th>
                  <th>Nasadený tag</th>
                  <th>Čas nasadenia</th>
                  <th>Stav</th>
                  <th class="col-expand" scope="col"><span class="visually-hidden">Ďalšie</span></th>
                </tr>
              </thead>
              <tbody></tbody>
            `;

            const tbody = table.querySelector("tbody");
            const hasMore = envRows.length > 1;

            envRows.forEach((row, rowIndex) => {
              const tr = document.createElement("tr");
              tr.className =
                "deployment-row " +
                (rowIndex > 0 ? "deployment-row--extra " : "") +
                (rowIndex % 2 === 0 ? "row--stripe-a" : "row--stripe-b");
              if (rowIndex > 0) {
                tr.style.display = "none";
                tr.setAttribute("hidden", "");
              }
              const envLabel = row.environment || "—";
              const state = row.state === "—" ? "—" : row.state;
              const statusClass =
                state === "—" ? "status--loading" : getStatusClass(state);

              const repoUrl = `https://github.com/${row.owner}/${row.repo}`;
              const expandCell =
                rowIndex === 0 && hasMore
                  ? `<td class="expand-cell">
                  <button type="button" class="expand-toggle" aria-expanded="false" aria-label="Zobraziť ďalšie nasadenia">
                    <span class="expand-toggle__icon" aria-hidden="true">▼</span>
                  </button>
                </td>`
                  : `<td class="expand-cell"></td>`;

              tr.innerHTML = `
                <td>${envLabel}</td>
                <td><a href="${repoUrl}" target="_blank" rel="noopener">${row.repo}</a></td>
                <td>${row.ref || "—"}</td>
                <td>${formatDate(row.created_at)}</td>
                <td><span class="status ${statusClass}">${state}</span></td>
                ${expandCell}
              `;
              tbody.appendChild(tr);
            });

            if (hasMore) {
              const btn = tbody.querySelector(".expand-toggle");
              const icon = btn.querySelector(".expand-toggle__icon");
              btn.addEventListener("click", () => {
                const expanded = table.classList.toggle("is-expanded");
                btn.setAttribute("aria-expanded", expanded ? "true" : "false");
                btn.setAttribute(
                  "aria-label",
                  expanded ? "Skryť ďalšie nasadenia" : "Zobraziť ďalšie nasadenia"
                );
                icon.textContent = expanded ? "▲" : "▼";
                tbody.querySelectorAll(".deployment-row--extra").forEach((trEl) => {
                  if (expanded) {
                    trEl.style.display = "";
                    trEl.removeAttribute("hidden");
                  } else {
                    trEl.style.display = "none";
                    trEl.setAttribute("hidden", "");
                  }
                });
              });
            }

            container.appendChild(table);
          });
      })
      .catch((err) => showError("Chyba pri načítavaní: " + err.message));
  </script>
</body>
</html>
