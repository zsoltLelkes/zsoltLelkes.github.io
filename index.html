<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard">
    <h1>Prehľad nasadení</h1>

    <div id="loading" class="loading">Načítavam nasadenia...</div>
    <div id="error" class="error" style="display: none;"></div>

    <div id="tablesContainer" style="display: none;"></div>
  </div>

  <script>
    /**
     * Dáta prichádzajú z deployment-data.json (generuje GitHub Actions, nie priame volanie API z prehliadača).
     */
    function getStatusClass(state) {
      const map = {
        success: "status--success",
        failure: "status--failure",
        error: "status--error",
        pending: "status--pending",
        queued: "status--queued",
        in_progress: "status--in_progress",
        inactive: "status--inactive"
      };
      return map[state] || "status--loading";
    }

    function formatDate(isoString) {
      if (!isoString) return "—";
      const date = new Date(isoString);
      return date.toLocaleString("sk-SK", {
        dateStyle: "medium",
        timeStyle: "short"
      });
    }

    function formatGeneratedAt(isoString) {
      if (!isoString) return "";
      try {
        return formatDate(isoString);
      } catch {
        return "";
      }
    }

    /**
     * Bezpečný fragment pre URL (#anchor): owner/repo, názov prostredia atď.
     */
    function anchorIdSegment(s) {
      return String(s || "")
        .toLowerCase()
        .replace(/\//g, "-")
        .replace(/[^a-z0-9._-]+/g, "-")
        .replace(/\.+/g, "-")
        .replace(/^-+|-+$/g, "")
        .replace(/-+/g, "-");
    }

    function makeTableAnchorId(prefix, segment) {
      const seg = anchorIdSegment(segment);
      return `${prefix}-${seg || "x"}`;
    }

    /**
     * Po dynamickom vykreslení tabuliek zarovnať scroll na #id z URL (zdieľané odkazy).
     */
    function scrollToHashAnchorIfPresent() {
      let raw = (location.hash || "").replace(/^#/, "");
      if (!raw) return;
      try {
        raw = decodeURIComponent(raw);
      } catch (_) {
        /* neplatný escape – skús pôvodný reťazec */
      }
      const el = document.getElementById(raw);
      if (!el || typeof el.scrollIntoView !== "function") return;
      el.scrollIntoView({ block: "start", behavior: "auto" });
    }

    function showError(msg) {
      document.getElementById("dashboardAnchorNav")?.remove();
      document.body.classList.remove("dashboard-page--with-nav");
      document.getElementById("loading").style.display = "none";
      document.getElementById("tablesContainer").style.display = "none";
      const err = document.getElementById("error");
      err.textContent = msg;
      err.style.display = "block";
    }

    /**
     * Fixné ľavé menu so všetkými kotvami na tabuľky (a úvod druhej sekcie).
     */
    function renderAnchorNav() {
      document.getElementById("dashboardAnchorNav")?.remove();
      document.body.classList.remove("dashboard-page--with-nav");

      const repoTables = document.querySelectorAll(
        "#tablesContainer .dashboard-section:not(.dashboard-section--secondary) table[id^=\"repo-\"]"
      );
      const envSection = document.querySelector(
        "#tablesContainer .dashboard-section--secondary"
      );
      const envTables = envSection
        ? envSection.querySelectorAll("table.dashboard-data-table[id^=\"env-\"]")
        : [];

      const repoItems = Array.from(repoTables).map((t) => ({
        href: "#" + t.id,
        label: t.getAttribute("data-nav-label") || t.id
      }));

      const envItems = [];
      if (envSection) {
        envItems.push({
          href: "#section-by-env-title",
          label: "Nadpis a filtre"
        });
      }
      Array.from(envTables).forEach((t) => {
        envItems.push({
          href: "#" + t.id,
          label: t.getAttribute("data-nav-label") || t.id
        });
      });

      if (repoItems.length === 0 && envItems.length === 0) return;

      const nav = document.createElement("nav");
      nav.id = "dashboardAnchorNav";
      nav.className = "dashboard-anchor-nav";
      nav.setAttribute("aria-label", "Obsah stránky");

      function appendGroup(title, items) {
        if (items.length === 0) return;
        const pt = document.createElement("p");
        pt.className = "dashboard-anchor-nav__group-title";
        pt.textContent = title;
        nav.appendChild(pt);
        const ul = document.createElement("ul");
        ul.className = "dashboard-anchor-nav__list";
        items.forEach(({ href, label }) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = href;
          a.className = "dashboard-anchor-nav__link";
          a.textContent = label;
          li.appendChild(a);
          ul.appendChild(li);
        });
        nav.appendChild(ul);
      }

      appendGroup("Repozitáre", repoItems);
      appendGroup("Podľa prostredia", envItems);

      document.body.classList.add("dashboard-page--with-nav");
      const dashboard = document.querySelector(".dashboard");
      if (dashboard) dashboard.prepend(nav);
    }

    function buildDataHint(generatedAtLabel) {
      const p = document.createElement("p");
      p.className = "filter-bar__hint dashboard-hint";
      if (generatedAtLabel) {
        p.innerHTML =
          `Údaje z <code>deployment-data.json</code> (aktualizované workflow). Posledná synchronizácia: <strong>${generatedAtLabel}</strong>.`;
      } else {
        p.innerHTML =
          `Údaje z <code>deployment-data.json</code> (aktualizované GitHub Actions).`;
      }
      return p;
    }

    function buildFilterBar() {
      const wrap = document.createElement("div");
      wrap.className = "filter-bar";
      wrap.innerHTML = `
        <p class="filter-empty" id="filterEmptyMessage" hidden>Žiadny riadok nevyhovuje zadaným filtrom.</p>
        <div class="filter-bar__toolbar">
          <button type="button" class="filter-clear" title="Vymazať všetky filtre">Vyčistiť filter</button>
        </div>
        <table class="dashboard-table dashboard-filter">
          <thead>
            <tr>
              <th>Prostredie</th>
              <th>Repozitár</th>
              <th>Nasadený tag</th>
              <th>Čas nasadenia</th>
              <th>Stav</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="text" class="filter-input" data-filter-col="0" placeholder="Hľadať…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Filter: prostredie" /></td>
              <td><input type="text" class="filter-input" data-filter-col="1" placeholder="Hľadať…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Filter: repozitár" /></td>
              <td><input type="text" class="filter-input" data-filter-col="2" placeholder="Hľadať…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Filter: tag" /></td>
              <td><input type="text" class="filter-input" data-filter-col="3" placeholder="Hľadať…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Filter: čas" /></td>
              <td><input type="text" class="filter-input" data-filter-col="4" placeholder="Stav…" autocomplete="off" spellcheck="false" inputmode="search" aria-label="Filter: stav" /></td>
            </tr>
          </tbody>
        </table>
      `;
      return wrap;
    }

    function applyClientFilters() {
      const inputs = document.querySelectorAll(".filter-input");
      const filters = Array.from(inputs).map((el) =>
        (el.value || "").trim().toLowerCase()
      );

      let totalVisible = 0;
      document.querySelectorAll("table.dashboard-data-table").forEach((table) => {
        let visibleCount = 0;
        table.querySelectorAll("tbody tr.dashboard-row--primary").forEach((tr) => {
          const tds = tr.querySelectorAll("td");
          let match = true;
          for (let i = 0; i < 5; i++) {
            if (!filters[i]) continue;
            const cellText = (tds[i] && tds[i].textContent) || "";
            if (!cellText.toLowerCase().includes(filters[i])) {
              match = false;
              break;
            }
          }
          tr.hidden = !match;
          const sub = tr.nextElementSibling;
          if (sub && sub.classList.contains("dashboard-row--last-success")) {
            sub.hidden = !match;
          }
          if (match) visibleCount += 1;
        });
        table.hidden = visibleCount === 0;
        totalVisible += visibleCount;
      });

      const emptyMsg = document.getElementById("filterEmptyMessage");
      if (emptyMsg) emptyMsg.hidden = totalVisible > 0;
    }

    function setupClientFilters() {
      const bar = document.querySelector(".filter-bar");
      if (!bar) return;

      bar.querySelectorAll(".filter-input").forEach((input) => {
        input.addEventListener("input", applyClientFilters);
      });

      const clearBtn = bar.querySelector(".filter-clear");
      if (clearBtn) {
        clearBtn.addEventListener("click", () => {
          bar.querySelectorAll(".filter-input").forEach((el) => {
            el.value = "";
          });
          applyClientFilters();
          bar.querySelector(".filter-input")?.focus();
        });
      }

      applyClientFilters();
    }

    function isSuccessState(state) {
      return String(state || "").toLowerCase() === "success";
    }

    function escapeAttr(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;");
    }

    /**
     * Obalí badge HTML odkazom na Actions run/job (rovnaké správanie ako pri hlavnom stave).
     */
    function wrapStatusBadgeWithRunUrl(innerHtml, runUrl) {
      const raw = runUrl && String(runUrl).trim();
      if (!raw) return innerHtml;
      try {
        const u = new URL(raw);
        if (u.protocol !== "http:" && u.protocol !== "https:") return innerHtml;
        return `<a class="status-badge-link" href="${escapeAttr(u.href)}" target="_blank" rel="noopener noreferrer" title="Otvoriť workflow run na GitHube">${innerHtml}</a>`;
      } catch {
        return innerHtml;
      }
    }

    /**
     * Hlavný badge stavu; ak je v riadku run_url (z deployment-data.json), obalí ho odkaz na GitHub Actions run.
     */
    function buildPrimaryBadgeHtml(row) {
      const state = row.state === "—" ? "—" : row.state;
      const statusClass =
        state === "—" ? "status--loading" : getStatusClass(state);
      const inner = `<span class="status ${statusClass}">${state}</span>`;
      return wrapStatusBadgeWithRunUrl(inner, row.run_url);
    }

    /**
     * Bunka „Stav“ na hlavnom riadku. Ak existuje last_success_at, text ide do podradeného riadku.
     */
    function buildStatusCellInnerHtml(row) {
      const badge = buildPrimaryBadgeHtml(row);
      if (isSuccessState(row.state)) {
        return badge;
      }
      const successLbl =
        '<span class="status status--success status--inline">success</span>';
      if (row.last_success_at) {
        return badge;
      }
      return `${badge} <span class="status-meta">(doteraz žiadny ${successLbl})</span>`;
    }

    function buildMainCells(row, options) {
      const omitRepo = options && options.omitRepo;
      const envLabel = row.environment || "—";
      const repoUrl = `https://github.com/${row.owner}/${row.repo}`;
      const repoCell = `<a href="${repoUrl}" target="_blank" rel="noopener">${row.repo}</a>`;
      if (omitRepo) {
        return `
                <td>${envLabel}</td>
                <td>${row.ref || "—"}</td>
                <td>${formatDate(row.created_at)}</td>
                <td class="dashboard-cell--status">${buildStatusCellInnerHtml(row)}</td>`;
      }
      return `
                <td>${envLabel}</td>
                <td>${repoCell}</td>
                <td>${row.ref || "—"}</td>
                <td>${formatDate(row.created_at)}</td>
                <td class="dashboard-cell--status">${buildStatusCellInnerHtml(row)}</td>`;
    }

    function buildLastSuccessSubRowCells(row, options) {
      const omitRepo = options && options.omitRepo;
      const envLabel = row.environment || "—";
      const repoUrl = `https://github.com/${row.owner}/${row.repo}`;
      const repoCell = `<a href="${repoUrl}" target="_blank" rel="noopener">${row.repo}</a>`;
      const successBadgeInner =
        '<span class="status status--success dashboard-last-success-badge">success</span>';
      const successLbl = wrapStatusBadgeWithRunUrl(
        successBadgeInner,
        row.last_success_run_url
      );
      const lastSuccessTime = formatDate(row.last_success_at);
      const statusInner = `<span class="status-meta">posledný ${successLbl} – ${lastSuccessTime}</span>`;
      if (omitRepo) {
        return `
                <td>${envLabel}</td>
                <td>${row.ref || "—"}</td>
                <td>${lastSuccessTime}</td>
                <td class="dashboard-cell--status">${statusInner}</td>`;
      }
      return `
                <td>${envLabel}</td>
                <td>${repoCell}</td>
                <td>${row.ref || "—"}</td>
                <td>${lastSuccessTime}</td>
                <td class="dashboard-cell--status">${statusInner}</td>`;
    }

    /**
     * Jeden logický záznam = jeden alebo dva riadky (podradený len pri last_success_at a stave ≠ success).
     * Pruhy sa striedajú po každom fyzickom riadku: podriadok „posledný success“ má opačnú farbu ako hlavný riadok.
     */
    function buildTableRowsHtml(row, primaryStripeAlt, cellOptions) {
      const opts = cellOptions || {};
      const primaryClass = primaryStripeAlt ? " dashboard-row--stripe-alt" : "";
      const main = `<tr class="dashboard-row--primary${primaryClass}">${buildMainCells(row, opts)}</tr>`;
      if (row.last_success_at && !isSuccessState(row.state)) {
        const subStripeAlt = !primaryStripeAlt;
        const subClass = subStripeAlt ? " dashboard-row--stripe-alt" : "";
        return `${main}<tr class="dashboard-row--last-success${subClass}">${buildLastSuccessSubRowCells(row, opts)}</tr>`;
      }
      return main;
    }

    /**
     * Poradie tabuliek podľa config.json (organization + repositories); ostatné repozitáre na konci.
     */
    function orderRepoSectionKeys(byRepo, organization, repositories) {
      const org = String(organization || "").trim();
      const ordered = [];
      const seen = new Set();
      if (Array.isArray(repositories)) {
        for (const repo of repositories) {
          const key = `${org}/${repo}`;
          if (byRepo[key] && !seen.has(key)) {
            ordered.push(key);
            seen.add(key);
          }
        }
      }
      const rest = Object.keys(byRepo)
        .filter((k) => !seen.has(k))
        .sort((a, b) => a.localeCompare(b, "sk"));
      return [...ordered, ...rest];
    }

    function renderByRepositorySection(rows, config) {
      const section = document.createElement("section");
      section.className = "dashboard-section";

      const byRepo = {};
      rows.forEach((row) => {
        const key = `${row.owner}/${row.repo}`;
        if (!byRepo[key]) byRepo[key] = [];
        byRepo[key].push(row);
      });

      Object.keys(byRepo).forEach((key) => {
        byRepo[key].sort((a, b) =>
          String(a.environment || "").localeCompare(
            String(b.environment || ""),
            "sk"
          )
        );
      });

      const organization =
        (config && config.organization) || rows[0]?.owner || "";
      const repositories =
        (config && Array.isArray(config.repositories) && config.repositories) ||
        [];
      const sortedKeys = orderRepoSectionKeys(
        byRepo,
        organization,
        repositories
      );

      const cellOptions = { omitRepo: true };

      sortedKeys.forEach((key) => {
        const repoRows = byRepo[key];
        const first = repoRows[0];
        const heading = document.createElement("h3");
        heading.className = "dashboard-repo-heading";
        const repoUrl = `https://github.com/${first.owner}/${first.repo}`;
        heading.innerHTML = `<a href="${repoUrl}" target="_blank" rel="noopener">${first.repo}</a>`;

        const table = document.createElement("table");
        table.id = makeTableAnchorId("repo", key);
        table.setAttribute("data-nav-label", first.repo);
        table.className =
          "dashboard-table dashboard-repo-table dashboard-table--cols-4";
        table.innerHTML = `
              <thead>
                <tr>
                  <th>Prostredie</th>
                  <th>Nasadený tag</th>
                  <th>Čas nasadenia</th>
                  <th>Stav</th>
                </tr>
              </thead>
              <tbody></tbody>
            `;

        const tbody = table.querySelector("tbody");
        let visualStripe = 0;
        repoRows.forEach((row) => {
          /* Párne indexy riadkov v DOM = pruh „alt“ (#f8fafc); prvý fyzický riadok tabuľky je alt. */
          const primaryStripe = visualStripe % 2 === 0;
          tbody.insertAdjacentHTML(
            "beforeend",
            buildTableRowsHtml(row, primaryStripe, cellOptions)
          );
          visualStripe += 1;
          if (row.last_success_at && !isSuccessState(row.state)) {
            visualStripe += 1;
          }
        });

        section.appendChild(heading);
        section.appendChild(table);
      });

      return section;
    }

    function renderByEnvironmentSection(rows) {
      const section = document.createElement("section");
      section.className = "dashboard-section dashboard-section--secondary";
      section.setAttribute("aria-labelledby", "section-by-env-title");

      const title = document.createElement("h2");
      title.id = "section-by-env-title";
      title.className = "dashboard-section__title";
      title.textContent = "Podľa prostredia";
      section.appendChild(title);

      const filterBar = buildFilterBar();
      section.appendChild(filterBar);

      const byEnv = {};
      rows.forEach((row) => {
        const env = row.environment || "—";
        if (!byEnv[env]) byEnv[env] = [];
        byEnv[env].push(row);
      });

      Object.keys(byEnv).forEach((env) => {
        byEnv[env].sort((a, b) =>
          String(a.repo).localeCompare(String(b.repo), "sk")
        );
      });

      Object.keys(byEnv)
        .sort()
        .forEach((env) => {
          const envRows = byEnv[env];

          const table = document.createElement("table");
          table.id = makeTableAnchorId(
            "env",
            env === "—" ? "none" : env
          );
          table.setAttribute(
            "data-nav-label",
            env === "—" ? "—" : env
          );
          table.className = "dashboard-table dashboard-data-table";
          table.innerHTML = `
              <thead>
                <tr>
                  <th>Prostredie</th>
                  <th>Repozitár</th>
                  <th>Nasadený tag</th>
                  <th>Čas nasadenia</th>
                  <th>Stav</th>
                </tr>
              </thead>
              <tbody></tbody>
            `;

          const tbody = table.querySelector("tbody");
          let visualStripe = 0;
          envRows.forEach((row) => {
            const primaryStripe = visualStripe % 2 === 0;
            tbody.insertAdjacentHTML(
              "beforeend",
              buildTableRowsHtml(row, primaryStripe, null)
            );
            visualStripe += 1;
            if (row.last_success_at && !isSuccessState(row.state)) {
              visualStripe += 1;
            }
          });

          section.appendChild(table);
        });

      return section;
    }

    function renderDashboard(payload, config) {
      const rows = Array.isArray(payload.rows) ? payload.rows : [];
      const generatedAt = payload.generatedAt
        ? formatGeneratedAt(payload.generatedAt)
        : "";

      if (rows.length === 0) {
        document.getElementById("dashboardAnchorNav")?.remove();
        document.body.classList.remove("dashboard-page--with-nav");
        document.getElementById("loading").textContent =
          "Žiadne nasadenia v deployment-data.json. Spusti workflow „Sync deployment data“ alebo počkaj na plánovaný beh.";
        document.getElementById("loading").style.display = "block";
        document.getElementById("tablesContainer").style.display = "none";
        return;
      }

      document.getElementById("loading").style.display = "none";
      const container = document.getElementById("tablesContainer");
      container.style.display = "block";
      container.innerHTML = "";

      container.appendChild(buildDataHint(generatedAt));
      container.appendChild(renderByRepositorySection(rows, config));
      container.appendChild(renderByEnvironmentSection(rows));

      setupClientFilters();
      renderAnchorNav();
      requestAnimationFrame(() => scrollToHashAnchorIfPresent());
    }

    Promise.all([
      fetch("deployment-data.json").then((res) => {
        if (!res.ok) {
          throw new Error(
            "Nepodarilo sa načítať deployment-data.json (HTTP " + res.status + ")"
          );
        }
        return res.json();
      }),
      fetch("config.json").then((res) => (res.ok ? res.json() : {}))
    ])
      .then(([payload, config]) => renderDashboard(payload, config))
      .catch((err) => showError("Chyba pri načítavaní: " + err.message));

    window.addEventListener("hashchange", scrollToHashAnchorIfPresent);
  </script>
</body>
</html>
