<!DOCTYPE html>
<html>
<body>
  <h1>Deployments</h1>
  <pre id="outputDeployments"></pre>

  <script>
    const ownerDeployments = "zsoltLelkes";
    const repoDeployments = "zsoltLelkes.github.io";

    fetch(`https://api.github.com/repos/${ownerDeployments}/${repoDeployments}/deployments`)
      .then(res => res.json())
      .then(data => {
        document.getElementById("outputDeployments").textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(err => console.error(err));
  </script>
