name: Sync deployment data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-deployment-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync deployment-data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOYMENTS_SYNC_TOKEN: ${{ secrets.DEPLOYMENTS_SYNC_TOKEN }}
        run: node scripts/sync-deployments.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployment-data.json
          if git diff --staged --quiet; then
            echo "Žiadne zmeny."
          else
            git commit -m "chore: sync deployment-data.json [skip ci]"
            git push
          fi
