name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fail_deploy:
        description: "Zlyhaj nasadenie (test dashboardu – simulácia chyby)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy staging
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.fail_deploy }}" = "true" ]; then
            echo "::error title=Simulovaná chyba::Nasadenie do staging zlyhalo (naschvál)."
            exit 1
          fi
          echo "Staging nasadenie OK"
